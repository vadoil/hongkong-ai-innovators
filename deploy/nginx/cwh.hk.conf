# /etc/nginx/sites-available/cwh.hk
# После certbot этот файл будет автоматически расширен HTTPS-блоком.

server {
    listen 80;
    listen [::]:80;
    server_name cwh.hk www.cwh.hk;

    # ACME challenge для Let's Encrypt
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Всё остальное — на Node SSR
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # Кэш для статики /_build/ и /assets/
    location ~* ^/(_build|assets)/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    client_max_body_size 2m;
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml image/svg+xml;
}